name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test .NET
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres # this name is used in tests
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    env:
      ConnectionStrings__PgDb: "Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres"
    
    steps:
      - name: Enable Automated Test Report Artifact Upload (FOR TUnit)
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install tools
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Restore dependencies
        run: dotnet restore --use-lock-file

      - name: Build
        run: dotnet build --no-restore

      - name: Run tests
        run: ./_DevOps/test-cov.sh

      - name: Upload JOB artifacts
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}           # run this step even if previous step failed
        with:
          name: TestResults
          path: ./TestResults
          retention-days: 14
